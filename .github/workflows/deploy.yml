name: Deploy to GitHub Pages

on:
  # Jalan tiap push ke master
  push:
    branches: [master]
  # Bisa dipicu manual dari tab Actions
  workflow_dispatch:

# Permission yang dibutuhkan untuk deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Izinkan 1 deploy konkuren; jangan batalkan run yang sedang jalan
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
